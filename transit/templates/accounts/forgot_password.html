<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TransitOps</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        blue: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                        },
                        slate: {
                            50: '#faf5ff',
                            100: '#f3e8ff',
                            200: '#e9d5ff',
                            300: '#d8b4fe',
                            400: '#c084fc',
                            500: '#a855f7',
                            800: '#20163A',
                            850: '#18102E',
                            900: '#0E0822',
                            950: '#080415',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-full flex-col justify-center bg-slate-950 px-6 py-12 lg:px-8 relative overflow-y-auto">
    <!-- Abstract Background Gradients -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md z-10">
        <div class="flex justify-center items-center gap-2 mb-4">
            <div class="rounded-xl bg-blue-600 p-2.5 text-white">
                <i class="fa-solid fa-truck-fast text-2xl"></i>
            </div>
            <span class="text-3xl font-extrabold text-white tracking-tight">TransitOps</span>
        </div>
        <h2 class="text-center text-xl font-bold tracking-tight text-slate-300">Recover Password</h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md z-10 font-sans">
        <div class="rounded-2xl border border-slate-800 bg-slate-900/50 p-8 shadow-2xl backdrop-blur-xl ring-1 ring-white/5">
            <h3 class="text-lg font-semibold text-white mb-3">Forgot your password?</h3>
            <p class="text-xs text-slate-400 mb-6">Enter your username or email address and we'll simulate the password recovery link for you instantly.</p>

            {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                        <div class="rounded-lg bg-red-500/15 border border-red-500/35 p-3 text-sm text-red-400">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form class="space-y-5" action="{% url 'forgot_password' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="username_or_email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Username or Email</label>
                    <div class="mt-2 relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                            <i class="fa-solid fa-user-tag"></i>
                        </span>
                        <input id="username_or_email" name="username_or_email" type="text" required class="block w-full rounded-xl border border-slate-700 bg-slate-850 py-2.5 pl-10 pr-4 text-sm text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="e.g. manager or manager@example.com">
                    </div>
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-xl bg-blue-600 py-2.5 text-sm font-semibold text-white shadow-lg shadow-blue-600/30 hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-all duration-300">
                        Reset Password
                    </button>
                </div>
            </form>

            <div class="mt-6 border-t border-slate-800 pt-6 text-center text-xs text-slate-400">
                Remember your password? 
                <a href="{% url 'login' %}" class="font-bold text-blue-500 hover:text-blue-400 ml-1 transition-colors">Sign In &rarr;</a>
            </div>
        </div>
    </div>
</body>
</html>
