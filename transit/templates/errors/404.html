{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] text-center">
    <div class="rounded-full bg-blue-500/10 p-6 text-blue-500 mb-6">
        <i class="fa-solid fa-compass-drafting text-6xl animate-pulse"></i>
    </div>
    <h1 class="text-7xl font-extrabold text-slate-800 dark:text-white tracking-tight mb-2">404</h1>
    <h2 class="text-2xl font-bold text-slate-700 dark:text-slate-300 mb-4">Route Not Found</h2>
    <p class="text-slate-500 dark:text-slate-400 max-w-md mb-8">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on course.
    </p>
    <a href="{% url 'dashboard' %}" class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500 transition-all">
        <i class="fa-solid fa-house"></i> Back to Dashboard
    </a>
</div>
{% endblock %}
